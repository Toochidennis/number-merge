<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#35e27d" />
  <title>Offline — Number Merge Puzzle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #05070d;
      color: #e8eaf0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
               env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }
    .container {
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 340px;
      width: 100%;
    }
    .icon-wrap {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.75rem;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(53,226,125,0.15), 0 8px 32px rgba(0,0,0,0.6);
    }
    .icon-wrap img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .badge {
      display: inline-block;
      background: rgba(53,226,125,0.12);
      color: #35e27d;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(53,226,125,0.25);
      border-radius: 100px;
      padding: 0.2rem 0.65rem;
      margin-bottom: 0.9rem;
    }
    h1 {
      font-size: 1.45rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 0.9rem;
      line-height: 1.65;
      color: #6b7a99;
      margin-bottom: 2.25rem;
    }
    .btn {
      display: inline-block;
      background: #35e27d;
      color: #05070d;
      border: none;
      border-radius: 14px;
      padding: 0.9rem 2.5rem;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }
    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 2.5rem;
    }
    .dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
    }
    .dots span:first-child { background: #35e27d; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <img src="/icons/icon-192x192.png" alt="Number Merge Puzzle icon" width="96" height="96" />
    </div>
    <div class="badge">Offline</div>
    <h1>You are offline</h1>
    <p>Number Merge Puzzle is ready to play once the game assets are loaded. Please reconnect or try again.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
  </div>
</body>
</html>
